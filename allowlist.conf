# Dobby Security Allowlists
# Uncomment and customize to enable security restrictions.
# When a section has rules, only listed items are allowed.

# [commands]
# allow = ls, cat, grep, find, head, tail, wc, echo, date, whoami, pwd, git

# [paths]
# allow = /home, /tmp, /var/log

# [endpoints]
# allow = http://localhost:11434, https://api.example.com

# [email]
# Controls who Dobby will receive email FROM and send email TO.
# When this section is active (uncommented), Dobby silently ignores
# all inbound mail from unlisted senders and refuses to send to
# unlisted recipients — even if the agent tries.
#
# Patterns support wildcards:
#   *@example.com   — any address at a domain
#   user@gmail.com  — exact address (case-insensitive)
#
# allow = you@gmail.com, trusted@example.com, *@mycompany.com
