# dobby AI Agent — Configuration
#
# dobby runs as a persistent daemon with a message bus at its core.
# All channels (CLI, HTTP, email) connect to the same running process
# and get their own isolated session (conversation history).
#
# Run modes:
#   dobby                  — HTTP gateway + CLI REPL (default)
#   dobby --no-cli         — HTTP gateway only (headless)
#   dobby --no-http        — CLI REPL only
#
# Secrets (API_KEY) go in .env — everything else lives here.
# Priority: shell env > .env > this file > built-in defaults

# ── Provider ───────────────────────────────────────────────────────
[provider]
# type: ollama (default, local) | groq | openrouter | openai | together
type  = ollama
model = mistral-nemo:12b
ollama_url = http://localhost:11434

# Remote providers: set type, model, and API_KEY in .env
# Groq:
# type = groq
# model = meta-llama/llama-4-scout-17b-16e-instruct
# OpenRouter: type = openrouter   model = <model-string>
# OpenAI:     type = openai  model = gpt-4o

# ── Agent behaviour ────────────────────────────────────────────────
[agent]
max_iterations = 10
# max_messages: compact history when it exceeds this count.
# 0 = compiled-in default (128). Tune down for small-context models.
max_messages   = 0
# session_ttl: seconds before an idle session is evicted (default: 3600)
session_ttl    = 3600

# ── Channels ───────────────────────────────────────────────────────
[gateway]
port      = 8080
html_path = assets/chat.html

[email]
imap_url      = imaps://imap.gmail.com:993
smtp_url      = smtps://smtp.gmail.com:465
address       = your-agent@gmail.com
poll_interval = 30
inbox         = INBOX
subject_tag   = [Dobby]

# ── File paths ─────────────────────────────────────────────────────
[paths]
workspace  = ~/.dobby
templates  = templates

# ── Security ───────────────────────────────────────────────────────
[security]
allowlist = allowlist.conf

# ── Tmux ───────────────────────────────────────────────────────────
[tmux]
socket = /tmp/dobby-tmux.sock

# ── Heartbeat ──────────────────────────────────────────────────────
[heartbeat]
interval = 60

# ── Logging ────────────────────────────────────────────────────────
[logging]
# level: debug | info | warn | error  (default: warn)
level = warn
# file = /var/log/dobby.log
